<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle de Venta — Tiendita</title>
  <link rel="stylesheet" th:href="@{/estilos.css}">
</head>
<body>


<nav class="navbar">
  <a th:href="@{/home}" class="nav-brand"><span>Tiendita</span></a>

  <div class="nav-links">
    <a th:href="@{/producto}">Productos</a>
    <a th:href="@{/cliente}">Clientes</a>
    <a th:href="@{/venta}">Ventas</a>
    <a th:href="@{/detalleVenta}" class="active">Detalle Venta</a>
    <a th:href="@{/usuario}">Usuarios</a>
  </div>

  <div class="nav-user">
    <a th:href="@{/home}" class="btn-back">Inicio</a>
    <a th:href="@{/login}" class="btn-logout">Salir</a>
  </div>
</nav>


<main>
  <div class="page-header">
    <h1>Detalle de Venta</h1>
    <p>Gestiona los productos incluidos en cada venta registrada</p>
  </div>

    <div class="msg-exito" th:if="${exito}" th:text="${exito}"></div>
    <div class="msg-error" th:if="${error}" th:text="${error}"></div>
    <div class="msg-error" th:if="${advertencia}" th:text="${advertencia}"></div>

    <form th:action="@{/detalleVenta/buscarDetalleVenta}" method="get" class="buscar-bar">
        <input type="number" name="id" placeholder="Buscar por ID..." min="1">
        <button type="submit" class="btn buscar">Buscar</button>
        <a th:href="@{/detalleVenta}" class="btn limpiar">Limpiar</a>
    </form>

    <div th:with="editando=${detallesVentaFormu.codigo_detalle_venta != null}">

        <span class="modo-badge modo-editar" th:if="${editando}">
            Modo Edición — ID:
            <span th:text="${detallesVentaFormu.codigo_detalle_venta}"></span>
        </span>

        <span class="modo-badge modo-crear" th:unless="${editando}">
            Modo Creación
        </span>

        <form th:action="${editando}
            ? @{/detalleVenta/actualizarDetalleVenta/{id}(id=${detallesVentaFormu.codigo_detalle_venta})}
            : @{/detalleVenta/guardarDetalleVenta}"
              method="post"
              th:object="${detallesVentaFormu}">

  <div class="form-card">
    <div class="form-grid">
      <div class="form-group">
        <label>Código Detalle</label>
        <input type="text" id="codigo_detalle" placeholder="Autoincrementado" readonly>
      </div>

      <div class="form-group">
        <label>Cód. Venta</label>
        <input type="text" id="ventas_codigo_venta" placeholder="Ej. 1">
      </div>

      <div class="form-group">
        <label>Cód. Producto</label>
        <input type="text" id="productos_codigo_producto" placeholder="Ej. 3">
      </div>

      <div class="form-group">
        <label>Cantidad</label>
        <input type="text" id="cantidad" placeholder="Ej. 2">
      </div>

      <div class="form-group">
        <label>Precio Unitario (Q)</label>
        <input type="text" id="precio_unitario" placeholder="Ej. 150.00">
      </div>
      <div class="form-group">
        <label>Subtotal (Q)</label>
        <input type="text" id="subtotal" placeholder="Autocalculado" readonly>
      </div>
    </div>
  </div>


  <div class="acciones">
    <button class="btn agregar">Agregar</button>
    <button class="btn editar">Editar</button>
    <button class="btn buscar">Buscar</button>
    <button class="btn eliminar">Eliminar</button>
    <button class="btn limpiar">Limpiar</button>
  </div>


  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Cód. Venta</th>
          <th>Cód. Producto</th>
          <th>Cantidad</th>
          <th>Precio Unit.</th>
          <th>Subtotal</th>
        </tr>
      </thead>
      <tbody id="tablaDetalleVenta">
      <tr th:each ="detalleVenta : ${detallesVenta}">
        <td th:text="${detalleVenta.codigo_detalle_venta}"></td>
        <td th:text="${detalleVenta.cantidad}"></td>
        <td th:text="${detalleVenta.precio_unitario}"></td>
        <td th:text="${detalleVenta.subtotal}"></td>
        <td th:text="${detalleVenta.productos_codigo_producto}"></td>
        <td th:text="${detalleVenta.ventas_codigo_venta}"></td>



      </tr>

      </tbody>
    </table>
  </div>
</main>

<footer>
  &copy; 2026 <strong>Tiendita</strong>
</footer>

</body>
</html>
