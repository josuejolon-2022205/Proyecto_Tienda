<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Productos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/producto.css}">
</head>
<body>

<nav class="navbar">
    <div class="nav-brand">ProyectoTienda</div>

    <div class="nav-links">
        <a th:href="@{/producto}">Productos</a>
        <a th:href="@{/detalleVenta}">Detalles Venta</a>
        <a th:href="@{/venta}">Ventas</a>
        <a th:href="@{/usuario}">Usuarios</a>
        <a th:href="@{/cliente}">Clientes</a>
    </div>

    <div class="nav-user">
        <span><strong th:text="${usuario}">usuario</strong></span>
        <a th:href="@{/usuario}" class="btn-logout">Cerrar sesión</a>
    </div>
</nav>

<main class="dashboard">

    <h1>Gestión de Productos</h1>
    <p class="subtitulo">Administra los productos del sistema</p>

    <form class="form-horizontal">
        <input type="text" placeholder="Nombre del producto" required>
        <input type="text" placeholder="Precio" required>
        <input type="text" placeholder="Stock" required>
    </form>

    <div class="acciones">
        <button class="btn agregar">Agregar</button>
        <button class="btn editar">Editar</button>
        <button class="btn buscar">Buscar</button>
        <button class="btn eliminar">Eliminar</button>
        <button class="btn limpiar">Limpiar</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Producto</th>
                <th>Precio</th>
                <th>Stock</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Ejemplo</td>
                <td>Q 50</td>
                <td>10</td>
            </tr>
        </tbody>
    </table>

</main>

<footer class="footer">
    <p>&copy; 2026 ProyectoTienda. Todos los derechos reservados.</p>
</footer>

</body>
</html>
