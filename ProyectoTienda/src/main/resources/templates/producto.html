<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos — Tiendita</title>
  <link rel="stylesheet" th:href="@{/estilos.css}">
</head>
<body>


<nav class="navbar">
  <a th:href="@{/home}" class="nav-brand"><span>Tiendita</span></a>

  <div class="nav-links">
    <a th:href="@{/producto}" class="active">Productos</a>
    <a th:href="@{/cliente}">Clientes</a>
    <a th:href="@{/venta}">Ventas</a>
    <a th:href="@{/detalleVenta}">Detalle Venta</a>
    <a th:href="@{/usuario}">Usuarios</a>
  </div>

  <div class="nav-user">
    <a th:href="@{/home}" class="btn-back">Inicio</a>
    <a th:href="@{/login}" class="btn-logout">Salir</a>
  </div>
</nav>


<main>
  <div class="page-header">
    <h1>Gestión de Productos</h1>
    <p>Administra el inventario, precios y disponibilidad de productos</p>
  </div>


  <div class="form-card">
    <div class="form-grid">
      <div class="form-group">
        <label>ID Producto</label>
        <input type="text" id="codigo_producto" placeholder="Autoincrementado" readonly>
      </div>
      <div class="form-group">
        <label>Nombre del Producto</label>
        <input type="text" id="nombre_producto" placeholder="Ej. Laptop HP 15.6&quot;">
      </div>
      <div class="form-group">
        <label>Precio (Q)</label>
        <input type="text" id="precio" placeholder="Ej. 4500.00">
      </div>
      <div class="form-group">
        <label>Stock</label>
        <input type="text" id="stock" placeholder="Ej. 20">
      </div>
      <div class="form-group">
        <label>Estado</label>
        <select id="estado">
          <option value="1">Activo</option>
          <option value="0">Inactivo</option>
        </select>
      </div>
    </div>
  </div>


  <div class="acciones">
    <button class="btn agregar">Agregar</button>
    <button class="btn editar">Editar</button>
    <button class="btn buscar">Buscar</button>
    <button class="btn eliminar">Eliminar</button>
    <button class="btn limpiar">Limpiar</button>
  </div>


  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre del Producto</th>
          <th>Precio</th>
          <th>Stock</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody id="tablaUsuarios">
        <tr th:each="producto : ${productos}">
          <td th:text="${producto.codigo_producto}">1</td>
          <td th:text="${producto.nombre_producto}">Laptop HP 15.6"</td>
          <td th:text="${producto.precio}">4500.00</td>
          <td th:text="${producto.stock}">20</td>
          <td th:text="${producto.estado == 1 ? 'Activo' : 'Inactivo'}">Activo</td>

      </tbody>
    </table>
  </div>
</main>

<footer>
  &copy; 2026 <strong>ProyectoTienda</strong>. Todos los derechos reservados.
</footer>

</body>
</html>
