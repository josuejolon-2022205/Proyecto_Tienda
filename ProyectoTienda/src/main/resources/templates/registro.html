<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro — Sistema</title>

    <link rel="stylesheet" href="register.css">
</head>
<body>

<div class="register-container">

    <h2>Crear Cuenta</h2>
    <p class="subtitulo">Completa los datos para registrarte</p>

    <div class="msg-exito" th:if="${exito}" th:text="${exito}"></div>

    <form th:action="@{/registro}" method="post">

        <div class="input-group">
            <label>Usuario</label>
            <input type="text" name="username" placeholder="Ej. vendedor01" required maxlength="45">
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" name="password" placeholder="••••••••" required maxlength="45">
        </div>

        <div class="input-group">
            <label>Correo Electrónico</label>
            <input type="email" name="email" placeholder="usuario@tienda.com" required maxlength="60">
        </div>

        <div class="input-group">
            <label>Rol</label>
            <select name="rol" required>
                <option value=""> Seleccione su rol</option>
                <option value="Administrador">Administrador</option>
                <option value="usuario">usuario</option>
            </select>
        </div>

        <input type="hidden" name="estado" value="1">

        <button type="submit">Registrarse</button>

    </form>

    <div class="login-link">
        ¿Ya tienes cuenta? <a th:href="@{/login}">Iniciar Sesión</a>
    </div>

    <div class="footer-text">© 2026 Sistema</div>

</div>

</body>
</html>
